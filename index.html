<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#1f2937">

<title>로또 자동번호 추출기</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f1e8;color:#222}
.wrap{max-width:560px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:24px;padding:24px 20px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center}
.logo{width:82px;height:82px;border-radius:22px;margin-bottom:10px}
h1{margin:0 0 8px;font-size:28px}
.desc{color:#666;margin-bottom:18px;line-height:1.5}
select{width:100%;padding:15px;border-radius:14px;border:1px solid #ddd;font-size:16px;margin-bottom:10px}
.btn{width:100%;border:0;border-radius:16px;padding:16px;font-size:18px;font-weight:700;cursor:pointer;margin-top:10px}
.primary{background:#1f2937;color:#fff}
.sub{background:#e5e7eb;color:#111}
.latest,.recent-box,.stats{margin-top:18px;background:#f8fafc;border-radius:18px;padding:14px;font-size:14px;color:#555;line-height:1.6}
.latest-title{font-weight:800;color:#111;margin-bottom:8px}
.machine{height:140px;margin:22px auto;display:none;align-items:center;justify-content:center;gap:12px;background:#f8fafc;border-radius:24px;overflow:hidden}
.machine.active{display:flex}
.spin-ball{width:42px;height:42px;border-radius:50%;background:#f6b100;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;animation:bounce .45s infinite alternate}
.spin-ball:nth-child(2){animation-delay:.1s;background:#1976d2}
.spin-ball:nth-child(3){animation-delay:.2s;background:#e53935}
.spin-ball:nth-child(4){animation-delay:.3s;background:#666}
.spin-ball:nth-child(5){animation-delay:.4s;background:#43a047}
.spin-ball:nth-child(6){animation-delay:.5s;background:#8e24aa}
@keyframes bounce{from{transform:translateY(38px) rotate(0deg)}to{transform:translateY(-38px) rotate(360deg)}}
.info{font-size:13px;color:#777;margin-top:8px}
.result{margin-top:22px}
.set{background:#fafafa;border-radius:18px;padding:14px;margin-bottom:14px}
.set-title{margin-bottom:10px;font-weight:700}
.balls{display:flex;justify-content:center;gap:7px;flex-wrap:wrap}
.ball{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:white}
.bonus{outline:3px solid #111}
.yellow{background:#f6b100}
.blue{background:#1976d2}
.red{background:#e53935}
.gray{background:#666}
.green{background:#43a047}
.footer{margin-top:18px;font-size:13px;color:#777}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <img src="icon-512.png" class="logo" alt="로또 아이콘">

    <h1>로또 자동번호 추출기</h1>
    <p class="desc">
      저장된 과거 당첨번호 데이터를 분석해<br>
      선택한 방식으로 번호를 추천합니다.
    </p>

    <div id="latestBox" class="latest">저장된 당첨번호를 불러오는 중입니다...</div>
    <div id="recentBox" class="recent-box" style="display:none;"></div>

    <select id="gameCount">
      <option value="1">1게임</option>
      <option value="2">2게임</option>
      <option value="3">3게임</option>
      <option value="4">4게임</option>
      <option value="5" selected>5게임</option>
    </select>

    <select id="mode">
      <option value="random">완전 랜덤</option>
      <option value="hot">과거 많이 나온 번호 중심</option>
      <option value="cold">과거 적게 나온 번호 중심</option>
      <option value="recentCold" selected>최근 10회 미출현 번호 중심</option>
      <option value="mixed">혼합 추천</option>
    </select>

    <button class="btn primary" onclick="generateLotto()">로또번호 추출</button>
    <button class="btn sub" onclick="copyNumbers()">번호 복사하기</button>

    <div id="machine" class="machine">
      <div class="spin-ball">?</div>
      <div class="spin-ball">?</div>
      <div class="spin-ball">?</div>
      <div class="spin-ball">?</div>
      <div class="spin-ball">?</div>
      <div class="spin-ball">?</div>
    </div>

    <div id="status" class="info">저장된 과거 데이터를 불러오는 중입니다.</div>
    <div id="result" class="result"></div>
    <div id="stats" class="stats" style="display:none;"></div>

    <div class="footer">※ 과거 통계 기반 추천이며 당첨을 보장하지 않습니다.</div>
  </div>
</div>

<script src="lotto-data.js"></script>

<script>
let lottoHistory = [];
let savedText = "";

function getColor(num){
  if(num <= 10) return "yellow";
  if(num <= 20) return "blue";
  if(num <= 30) return "red";
  if(num <= 40) return "gray";
  return "green";
}

function ballHtml(num, bonus=false){
  return `<div class="ball ${getColor(num)} ${bonus ? "bonus" : ""}">${num}</div>`;
}

function loadLottoData(){
  const latestBox = document.getElementById("latestBox");
  const recentBox = document.getElementById("recentBox");
  const status = document.getElementById("status");

  if(typeof LOTTO_HISTORY === "undefined" || !Array.isArray(LOTTO_HISTORY) || LOTTO_HISTORY.length === 0){
    latestBox.innerHTML = "저장된 로또 데이터가 없습니다.";
    status.textContent = "lotto-data.js 파일을 확인하세요.";
    lottoHistory = [];
    return;
  }

  lottoHistory = LOTTO_HISTORY.slice().sort((a,b) => a.round - b.round);

  const latest = lottoHistory[lottoHistory.length - 1];

  latestBox.innerHTML = "";
  latestBox.style.display = "none";

  function renderTodayPick(numbers){

  const latestBox = document.getElementById("latestBox");

  latestBox.style.display = "block";

  latestBox.innerHTML = `
    <div class="latest-title">
      오늘의 추천 번호
    </div>

    <div class="balls" style="margin-top:10px;">
      ${numbers.map(n => ballHtml(n)).join("")}
    </div>
  `;
}

  const recent = lottoHistory.slice(-5).reverse();

  recentBox.style.display = "none";
  recentBox.innerHTML = "";

  status.textContent =
    "저장된 " + lottoHistory.length + "회차 데이터 분석 완료";

  showStats();
}

function makeFrequency(){
  const freq = {};
  for(let i=1;i<=45;i++) freq[i] = 0;

  lottoHistory.forEach(item => {
    item.numbers.forEach(n => freq[n]++);
  });

  return freq;
}

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function pickRandom(){
  const numbers = [];

  while(numbers.length < 6){
    const n = Math.floor(Math.random() * 45) + 1;
    if(!numbers.includes(n)) numbers.push(n);
  }

  return numbers.sort((a,b)=>a-b);
}

function pickNumbersByMode(mode){
  if(mode === "random" || lottoHistory.length === 0){
    return pickRandom();
  }

  const freq = makeFrequency();

  let pool = Object.keys(freq).map(n => ({
    num: Number(n),
    count: freq[n]
  }));

  if(mode === "hot"){
    pool.sort((a,b)=>b.count-a.count);
    pool = pool.slice(0,22);
  }

  if(mode === "cold"){
    pool.sort((a,b)=>a.count-b.count);
    pool = pool.slice(0,22);
  }

  if(mode === "recentCold"){
    const recent10 = lottoHistory.slice(-10);
    const recentNums = new Set();

    recent10.forEach(item => {
      item.numbers.forEach(n => recentNums.add(n));
    });

    pool = pool.filter(item => !recentNums.has(item.num));

    if(pool.length < 6){
      pool = Object.keys(freq).map(n => ({
        num:Number(n),
        count:freq[n]
      }));
    }
  }

  if(mode === "mixed"){
    const hot = [...pool].sort((a,b)=>b.count-a.count).slice(0,15);
    const cold = [...pool].sort((a,b)=>a.count-b.count).slice(0,15);
    const middle = shuffle([...pool]).slice(0,15);
    pool = [...hot, ...cold, ...middle];
  }

  pool = shuffle(pool);

  const numbers = [];

  for(const item of pool){
    if(numbers.length >= 6) break;
    if(!numbers.includes(item.num)) numbers.push(item.num);
  }

  while(numbers.length < 6){
    const n = Math.floor(Math.random() * 45) + 1;
    if(!numbers.includes(n)) numbers.push(n);
  }

  return numbers.sort((a,b)=>a-b);
}

function generateLotto(){
  const result = document.getElementById("result");
  const machine = document.getElementById("machine");
  const gameCount = Number(document.getElementById("gameCount").value);
  const mode = document.getElementById("mode").value;

  result.innerHTML = "";
  savedText = "";
  machine.classList.add("active");

  if(lottoHistory.length === 0){
    loadLottoData();
  }

  setTimeout(() => {
    machine.classList.remove("active");

    for(let i=1;i<=gameCount;i++){
      const nums = pickNumbersByMode(mode);
      if(i === 1){
        renderTodayPick(nums);
      }
      savedText += `${i}게임: ${nums.join(", ")}\n`;

      const setDiv = document.createElement("div");
      setDiv.className = "set";
      setDiv.innerHTML = `
        <div class="set-title">${i}게임</div>
        <div class="balls">
          ${nums.map(n => ballHtml(n)).join("")}
        </div>
      `;

      result.appendChild(setDiv);
    }
  }, 1600);
}

function showStats(){
  if(lottoHistory.length === 0) return;

  const stats = document.getElementById("stats");
  const freq = makeFrequency();

  const sorted = Object.keys(freq).map(n => ({
    num:Number(n),
    count:freq[n]
  }));

  const hot = [...sorted].sort((a,b)=>b.count-a.count).slice(0,6);
  const cold = [...sorted].sort((a,b)=>a.count-b.count).slice(0,6);

  stats.style.display = "block";
  stats.innerHTML =
    "<b>통계 요약</b><br>" +
    "많이 나온 번호: " +
    hot.map(x => x.num + "번(" + x.count + "회)").join(", ") +
    "<br>" +
    "적게 나온 번호: " +
    cold.map(x => x.num + "번(" + x.count + "회)").join(", ");
}

function copyNumbers(){
  if(!savedText){
    alert("먼저 번호를 추출하세요.");
    return;
  }

  navigator.clipboard.writeText(savedText)
    .then(() => alert("번호가 복사되었습니다."))
    .catch(() => alert("복사에 실패했습니다."));
}

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}

loadLottoData();
</script>
</body>
</html>
