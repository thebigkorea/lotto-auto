<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 자동번호 추출기</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f1e8;
  color:#222;
}

.wrap{
  max-width:480px;
  margin:0 auto;
  padding:24px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:28px 22px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  text-align:center;
}

h1{
  margin:0 0 8px;
  font-size:28px;
}

.desc{
  color:#666;
  margin-bottom:24px;
}

.btn{
  width:100%;
  border:0;
  border-radius:16px;
  padding:16px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}

.primary{
  background:#1f2937;
  color:#fff;
}

.sub{
  background:#e5e7eb;
  color:#111;
}

.result{
  margin-top:24px;
}

.set{
  background:#fafafa;
  border-radius:18px;
  padding:14px;
  margin-bottom:14px;
}

.balls{
  display:flex;
  justify-content:center;
  gap:7px;
  flex-wrap:wrap;
}

.ball{
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:white;
}

.yellow{background:#f6b100;}
.blue{background:#1976d2;}
.red{background:#e53935;}
.gray{background:#666;}
.green{background:#43a047;}

.footer{
  margin-top:18px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>로또 자동번호 추출기</h1>
    <p class="desc">1부터 45까지 중복 없이 6개 번호를 자동으로 추출합니다.</p>

    <button class="btn primary" onclick="generateLotto()">자동번호 5게임 추출</button>
    <button class="btn sub" onclick="copyNumbers()">번호 복사하기</button>

    <div id="result" class="result"></div>

    <div class="footer">
      ※ 재미용 자동번호 추출기입니다.
    </div>
  </div>
</div>

<script>
let savedText = "";

function generateOneSet(){
  const numbers = [];

  while(numbers.length < 6){
    const n = Math.floor(Math.random() * 45) + 1;
    if(!numbers.includes(n)){
      numbers.push(n);
    }
  }

  return numbers.sort((a,b) => a-b);
}

function getColor(num){
  if(num <= 10) return "yellow";
  if(num <= 20) return "blue";
  if(num <= 30) return "red";
  if(num <= 40) return "gray";
  return "green";
}

function generateLotto(){
  const result = document.getElementById("result");
  result.innerHTML = "";
  savedText = "";

  for(let i=1; i<=5; i++){
    const nums = generateOneSet();

    savedText += `${i}게임: ${nums.join(", ")}\n`;

    const setDiv = document.createElement("div");
    setDiv.className = "set";

    const title = document.createElement("div");
    title.style.marginBottom = "10px";
    title.style.fontWeight = "700";
    title.textContent = i + "게임";

    const ballsDiv = document.createElement("div");
    ballsDiv.className = "balls";

    nums.forEach(num => {
      const ball = document.createElement("div");
      ball.className = "ball " + getColor(num);
      ball.textContent = num;
      ballsDiv.appendChild(ball);
    });

    setDiv.appendChild(title);
    setDiv.appendChild(ballsDiv);
    result.appendChild(setDiv);
  }
}

function copyNumbers(){
  if(!savedText){
    alert("먼저 번호를 추출하세요.");
    return;
  }

  navigator.clipboard.writeText(savedText)
    .then(() => alert("번호가 복사되었습니다."))
    .catch(() => alert("복사에 실패했습니다."));
}
</script>
</body>
</html>
